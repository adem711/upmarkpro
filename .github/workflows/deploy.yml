name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_DNd5aOxx6t6ZMM0EdLxY1d2z
          VERCEL_PROJECT_ID: prj_HLRn3KLv9xB0qFwBEKeYrbsLoMbn
